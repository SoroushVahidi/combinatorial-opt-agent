name: Collect Optimization Data

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "collectors/**"
      - "pipeline/**"

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        run: |
          python pipeline/run_collection.py \
            --sources nl4opt gurobi_optimods gurobi_examples

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/
