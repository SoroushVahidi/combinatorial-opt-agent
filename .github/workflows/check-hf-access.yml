# Lightweight one-click workflow to confirm that HF_TOKEN is set correctly
# and that the NLP4LP dataset is reachable — without running the full benchmark.
#
# Trigger from: Actions tab → "Check HF access" → Run workflow
#
# Also has a path-filtered push trigger so GitHub registers this workflow
# in its sidebar. The verify step is gated to workflow_dispatch only.

name: Check HF access

on:
  workflow_dispatch:
  # Restricted push trigger so GitHub registers this workflow for sidebar display.
  # The verify step is gated with `if: github.event_name == 'workflow_dispatch'`
  # so nothing meaningful runs on push.
  push:
    branches:
      - "copilot/main-branch-description"
    paths:
      - ".github/workflows/check-hf-access.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Skip on push (registration only)
        if: github.event_name == 'push'
        run: echo "Registration-only run. Trigger via workflow_dispatch to verify HF access."

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        if: github.event_name == 'workflow_dispatch'
        run: pip install -q huggingface_hub

      - name: Verify HF token and dataset access
        if: github.event_name == 'workflow_dispatch'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python training/external/verify_hf_access.py
